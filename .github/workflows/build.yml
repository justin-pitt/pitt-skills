name: build
on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install PowerShell
        run: |
          sudo apt-get update && sudo apt-get install -y wget apt-transport-https software-properties-common
          source /etc/os-release
          wget -qO /tmp/packages-microsoft-prod.deb "https://packages.microsoft.com/config/ubuntu/$VERSION_ID/packages-microsoft-prod.deb"
          sudo dpkg -i /tmp/packages-microsoft-prod.deb
          sudo apt-get update && sudo apt-get install -y powershell
      - name: Run build
        run: ./scripts/build.sh
      - name: Verify no diff
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::build.ps1 produced changes (modified or new files) — commit them"
            git status --short
            git diff
            exit 1
          fi
  pester:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Pester
        run: pwsh -c "Install-Module Pester -Scope CurrentUser -Force"
      - name: Run Pester tests
        run: pwsh -c "Invoke-Pester tests/ -Output Detailed -CI"
  bats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get install -y bats
      - run: bats tests/install/install.bats
  version-bump:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Check for skill changes vs version bump
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          if git diff --name-only "$base" HEAD | grep -qE '^plugins/pitt-skills/skills/[^/]+/SKILL\.md$'; then
            if ! git diff --name-only "$base" HEAD | grep -q '^plugins/pitt-skills/.claude-plugin/plugin.json$'; then
              if ! git log "$base..HEAD" --pretty=%B | grep -q '\[skip-bump\]'; then
                echo "::error::SKILL.md changed but plugin.json version not bumped. Bump version or add [skip-bump] to a commit message."
                exit 1
              fi
            fi
          fi
